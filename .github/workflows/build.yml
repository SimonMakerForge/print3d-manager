name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Vite + Electron
        run: npm run dist

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist_electron/**/*.exe
          name: Print3D Manager ${{ github.ref_name }}
          body: |
            ## Novità ${{ github.ref_name }} / What's new

            Vedi il README per la lista completa delle funzionalità.
            See README for the full list of features.

            ---

            ## Download
            Scarica il file .exe qui sotto — nessuna installazione richiesta.
            Download the .exe file below — no installation required, just run it.

            > Windows SmartScreen
            > IT: Clicca "Ulteriori informazioni" - "Esegui comunque"
            > EN: Click "More info" - "Run anyway"

            ---
            (c) SimonMakerForge - https://github.com/SimonMakerForge/print3d-manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
