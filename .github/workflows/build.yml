name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
         
      - name: Install dependencies
        run: npm install

      - name: Build Vite
        run: npm run build

      - name: Build Electron portable only
        run: npx electron-builder --win portable --x64

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist_electron/**/*portable*.exe
          name: Print3D Manager ${{ github.ref_name }}
          body: |
            ## Print3D Manager ${{ github.ref_name }}

            ## Download
            Scarica il file .exe qui sotto - nessuna installazione richiesta, avvia direttamente.
            Download the .exe file below - no installation required, just run it.

            > Windows SmartScreen
            > IT: Clicca "Ulteriori informazioni" - "Esegui comunque"
            > EN: Click "More info" - "Run anyway"

            ---
            (c) SimonMakerForge - https://github.com/SimonMakerForge/print3d-manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
